name: Roadmap

on:
  push:
    paths:
      - docs/ROADMAP.md
      - scripts/roadmap.py
      - tests/test_roadmap.py
  pull_request:
    paths:
      - docs/ROADMAP.md
      - scripts/roadmap.py
      - tests/test_roadmap.py

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run python scripts/roadmap.py validate
      - run: uv run --group dev pytest tests/test_roadmap.py -q
