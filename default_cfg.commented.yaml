# Curated, human-annotated companion to default_cfg.yaml.
# The canonical machine-validated template is default_cfg.yaml and is generated
# from TrainConfig defaults via scripts/generate_default_cfg.py.

seed: 42
run_name: orbit_wars_template_ppo
device: auto
save_dir: artifacts/rl_template
checkpoint_every: 10
log_every: 1
opponent: random
# Environment simulator backend: "kaggle" (python env) or "jax" (accelerated env).
env_backend: kaggle
# RL trainer backend: only "jax" is supported.
rl_backend: jax
# Self-play checkpoint refresh cadence (in PPO updates).
self_play_update_interval: 10
# If true, self-play opponents act deterministically at inference time.
self_play_deterministic: false
# Master switch for self-play policy opponents.
self_play_enabled: false
# Max historical self-play snapshots retained in-memory for sampling.
self_play_pool_size: 5
# Snapshot cadence for adding current policy to self-play pool.
self_play_snapshot_interval: 25
# In pool sampling, probability of picking the latest snapshot (vs older pool members).
self_play_latest_probability: 0.5
# Multi-opponent selector mode (for example mixed vs single-opponent scheduling).
multi_opponent_mode: mixed
# If true, alternate controlled player side between episodes.
alternate_player_sides: true
env:
  MAX_STEPS: 500
  candidate_count: 8
  ship_bucket_count: 8
  max_planets: 48
  max_fleets: 256
  player_count: 2
  ship_speed: 6.0
  max_ships: 400.0
  max_production: 5.0
  reward_capture_planet: 0.0
  reward_ship_delta: 0.0
  reward_production_delta: 0.0
  reward_terminal_scale: 1.0
  # Enable terminal reward shaping based on how early (before horizon) the match ends.
  early_terminal_reward_shaping_enabled: true
  # Horizon used for early terminal shaping bonus/penalty scaling.
  early_terminal_reward_shaping_horizon: 500
  terminal_reward_mode: binary_win
  feature_history_steps: 1
model:
  architecture: mlp
  hidden_size: 128
  attention_heads: 4
  normalize_observations: true
  obs_norm_clip: 10.0
ppo:
  rollout_steps: 32
  num_envs: 4
  num_envs_2p: null
  num_envs_4p: null
  # Optional backend-specific rollout partition blocks.
  rollout_groups: []
  # Optional optimizer phase blocks (backend-dependent).
  phases: []
  total_updates: 200
  epochs: 4
  minibatch_size: 512
  gamma: 0.99
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  lr: 0.0003
  max_grad_norm: 0.5
training_format:
  # Curriculum phases over formats/player_count (entries are backend-specific dicts).
  format_schedule: []
  # Weighted concurrent format mix (entries are backend-specific dicts).
  format_mix: []
  # Optional rollout worker grouping by format.
  rollout_groups: []
  # Optional generalized phase blocks for format curricula.
  phases: []
opponent_mix:
  # Relative opponent sampling weights; values are normalized at runtime.
  weights:
    latest: 1.0
    historical: 0.0
    scripted_sniper: 0.0
    random: 0.0
    noop: 0.0
  # Softmax temperature for mixture sampling.
  temperature: 1.0
  # Optional curriculum blocks to change opponent mix over time.
  curriculum: []
wandb:
  enabled: false
  project: null
  entity: null
  group: null
  tags: []
  log_artifacts: false
  log_model_every: 100
  watch_model: false
replay:
  # Emit deterministic replay traces on checkpoint boundaries.
  enabled: false
  every_n_checkpoints: 1
  opponent: random
  # Replay seed policy: "update" tracks update index, or set other supported policies.
  seed_policy: update
  max_steps: 500
  output_dir: replays
checkpoint_retention:
  # Always keep the newest N checkpoints.
  keep_last_n: 5
  # Keep periodic checkpoints every N updates (0 disables periodic pinning).
  keep_every_n_updates: 0
  # Keep top-K checkpoints by metric (0 disables best-metric retention).
  keep_best_k_by_metric: 0
  best_metric_name: episode_reward_mean
  # "max" keeps highest metric, "min" keeps lowest.
  best_metric_mode: max
  min_update_for_pruning: 0
  # If true, report prune candidates without deleting files.
  dry_run_pruning: false
# Force a fresh RNG seed every N updates (0 disables periodic reseeding).
reseed_every_updates: 0
# If true, reseed when plateau criteria are met.
reseed_on_plateau: false
plateau_metric: episode_reward_mean
plateau_window: 10
plateau_delta: 0.0
# Optional held-out deterministic seed set for periodic eval.
heldout_eval_seed_set: []
