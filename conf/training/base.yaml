rollout_steps: 128
num_envs: 32
format_weights:
  2: 0.5
  4: 0.5
total_updates: 100

epochs: 1
update_chunk_rows: 4096
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.15
ent_coef: 0.006
vf_coef: 1.0
lr: 0.00006
max_grad_norm: 1.0

# <= each rollout group's num_envs and must divide it evenly (see conf/training/README.md).
rollout_microbatch_envs: 16

rotate_format_rollouts: false
lean_rollout_metrics: true
enable_gradient_checkpointing: true

log_every: 1

reseed_every_updates: 50
reseed_on_plateau: false
plateau_metric: episode_reward_mean
plateau_window: 10
plateau_delta: 0.0
debug_replay_parity: false
