rollout_steps: 500
num_envs: 32
format_weights:
  2: 1.0
  4: 0.0
total_updates: 100

epochs: 1
update_chunk_rows: 1024
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.15
ent_coef: 0.006
vf_coef: 1.0
lr: 0.00006
max_grad_norm: 1.0

rollout_microbatch_envs: 32

rotate_format_rollouts: false
lean_rollout_metrics: true
enable_gradient_checkpointing: true

log_every: 1

reseed_every_updates: 0
reseed_on_plateau: false
plateau_metric: episode_reward_mean
plateau_window: 10
plateau_delta: 0.0
debug_replay_parity: false
