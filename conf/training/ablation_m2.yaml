# M2 ablation training profile — higher batch/env throughput for GPU workstations.
# Pair with format=mix_2p_4p_16env and telemetry=ablation.
rollout_steps: 64
num_envs: 32
total_updates: 500
epochs: 1
minibatch_size: 512
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.2
ent_coef: 0.005
vf_coef: 0.5
lr: 0.0003
max_grad_norm: 0.5
update_chunk_rows_min: 2048
update_chunk_rows_max: null
rollout_microbatch_envs: 16
rotate_format_rollouts: true
lean_rollout_metrics: true
enable_gradient_checkpointing: false
log_every: 25
reseed_every_updates: 0
reseed_on_plateau: false
plateau_metric: episode_reward_mean
plateau_window: 10
plateau_delta: 0.0
