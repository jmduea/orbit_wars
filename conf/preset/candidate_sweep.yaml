seed: 42
run_name: orbit_wars_ppo_attention_candidates_16
device: auto
save_dir: artifacts/attention_candidates_16
checkpoint_every: 50
log_every: 1
opponent: self
self_play_update_interval: 50
self_play_deterministic: false
self_play_enabled: false
self_play_pool_size: 5
self_play_snapshot_interval: 50
self_play_latest_probability: 0.5
multi_opponent_mode: mixed
alternate_player_sides: true

env:
  # Includes reserved no-op index 0; real target slots are candidate_count - 1.
  candidate_count: 16
  ship_bucket_count: 8
  player_count: 2
  reward_capture_planet: 0.0
  reward_ship_delta: 0.0
  reward_production_delta: 0.0
  reward_terminal_scale: 1.0

model:
  architecture: attention  # mlp | attention | transformer
  hidden_size: 128
  attention_heads: 4
  normalize_observations: true
  obs_norm_clip: 10.0

ppo:
  rollout_steps: 512
  num_envs: 8
  total_updates: 2000
  epochs: 4
  minibatch_size: 512
  gamma: 0.99
  clip_coef: 0.2
  ent_coef: 0.02
  vf_coef: 0.5
  lr: 0.0001
  max_grad_norm: 0.5
  update_chunk_rows_min: 8192
  update_chunk_rows_max: null
  rollout_microbatch_envs: null
  enable_gradient_checkpointing: false
