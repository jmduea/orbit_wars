  - _self_

# Minimal telemetry for long GPU ablation runs (no W&B sync overhead).
metric_groups:
  core_progress: true
  losses: true
  timing: true
  curriculum: true
  opponent_composition: true
  action_decision: true
  game_state: true
  trajectory_shield_debug: true
  historical_pool: true
  debug: true
  events: true

wandb:
