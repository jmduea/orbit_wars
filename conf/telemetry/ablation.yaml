defaults:
  - base
  - _self_

# Minimal telemetry for long GPU ablation runs (no W&B sync overhead).
metric_groups:
  core_progress: true
  losses: true
  timing: true
  curriculum: false
  opponent_composition: false
  action_decision: false
  game_state: false
  trajectory_shield_debug: false
  historical_pool: false
  events: false

wandb:
  enabled: false
  project: orbit_wars
  entity: null
  group: ablation
  tags: [ablation]
  log_artifacts: false
  log_model_every: 1000
  watch_model: false
