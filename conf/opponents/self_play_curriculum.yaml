defaults:
  - base
  - _self_

self_play:
  enabled: true
  update_interval: 50
  deterministic: true

mode:
  opponent: self
  multi_opponent_mode: mixed
  alternate_player_sides: true

mix:
  weights:
    latest: 1.0
    historical: 0.0
    nearest_sniper: 0.0
    turtle: 0.0
    opportunistic: 0.0
    random: 0.0
    noop: 0.0
  temperature: 1.0

snapshot:
  pool_size: 2
  interval_updates: 250
  deterministic: true
  selection: uniform
  fallback: latest