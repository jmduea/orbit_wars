gate_id: curriculum_staged
title: Curriculum staged promotion (Gate 4)
default_model: transformer_factorized
ladder_index: 2
thresholds_key: learning_signal
workflow: ow benchmark learn-proof --through curriculum_staged
primitive: ow benchmark gate run curriculum_staged

train:
  default:
    model: transformer_factorized
    train_overrides:
      - training=2p4p_16_split
      - training.rollout_steps=128
      - training.total_updates=500
      - curriculum=self_play_staged
    evaluation:
      min_win_rate_delta: null
      require_curriculum_promotion: true

  planet_flow_target_heatmap:
    model: planet_flow_target_heatmap
    thresholds_key: planet_flow_learning_signal
    train_base: planet_flow
    train_overrides:
      - training=planet_flow
      - training.total_updates=500
      - opponents=random_only
    evaluation:
      min_win_rate_delta: null
      require_planet_flow_control_metrics: true
      max_post_mask_unreachable_demand_rate: from_thresholds
      needs_calibration_key: planet_flow_learning_signal
