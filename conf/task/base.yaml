candidate_count: 3
ship_bucket_count: 5
max_fleets: 256
max_ships: 400.0
player_count: 4

ship_feature_scale: 100.0
feature_history_steps: 1 # temporal feature control

trajectory_shield_mode: off # off | cheap | exact | tiered
rollout_factorized_sampling: lattice # lattice | selected_validate
trajectory_shield_final_validate_selected: false
trajectory_shield_hit_mode: selected_target # non_friendly
trajectory_shield_horizon: 30
trajectory_shield_epsilon: 1.0e-06

intercept_anchors: [1.0, 3.0, 6.0]
edge_rank_mode: intercept_min
ship_action_mode: continuous_fraction # continuous_fraction or buckets

map_pool_path: null
map_pool_sha256: null