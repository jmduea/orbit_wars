program: -m
method: random
run_cap: 8
metric:
  name: episode_reward_mean
  goal: maximize
command:
  - uv
  - run
  - python
  - ${program}
  - src.train
  - ${args_no_hyphens}
parameters:
  output.campaign:
    value: kaggle_runner_mvp
  telemetry.wandb.group:
    value: kaggle_runner_mvp
  telemetry.wandb.tags:
    value: [kaggle, population, population_mvp]
  telemetry.wandb.enabled:
    value: true
  telemetry.wandb.log_artifacts:
    value: true
  model:
    value: transformer_factorized
  training:
    value: 2p4p_16_rotate
  opponents:
    value: self_play_curriculum
  curriculum:
    value: self_play_staged
  artifacts.checkpoint_every:
    value: 100
  artifacts.artifact_pipeline.enabled:
    value: true
  artifacts.artifact_pipeline.docker_validation_async:
    value: false
  artifacts.replay.enabled:
    value: false
  training.total_updates:
    value: 500
  training.gamma:
    values: [0.99, 0.999]
  training.gae_lambda:
    values: [0.95, 0.99]
  training.lr:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.0006
  training.ent_coef:
    distribution: log_uniform_values
    min: 0.001
    max: 0.01
  model.hidden_size:
    values: [140, 224]
  model.planet_transformer_layers:
    values: [1, 2]
  task.feature_history_steps:
    values: [2, 5]
  task.trajectory_shield_horizon:
    values: [10, 20]
