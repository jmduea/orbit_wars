program: -m
method: bayes
metric:
  name: overall_win_rate
  goal: maximize
command:
  - uv
  - run
  - python
  - ${program}
  - src.train
  - ${args_no_hyphens}
parameters:
  telemetry.wandb.group:
    value: curriculum
  telemetry.wandb.tags:
    value: [curriculum, opponents]
  model:
    value: attention
  training.total_updates:
    value: 250
  curriculum:
    value: self_play_staged
  opponents:
    value: self_play_curriculum
  curriculum.stages.1.opponent_families.historical:
    values: [0.15, 0.20, 0.25]
  curriculum.stages.1.opponent_families.nearest_sniper:
    values: [0.0, 0.07, 0.1]
