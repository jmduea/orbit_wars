program: -m
method: bayes
metric:
  name: overall_win_rate
  goal: maximize
command:
  - uv
  - run
  - python
  - ${program}
  - src.train
  - ${args_no_hyphens}
parameters:
  telemetry.wandb.group:
    value: reward
  telemetry.wandb.tags:
    value: [reward]
  model:
    value: attention
  training.total_updates:
    value: 250
  reward.reward_capture_planet:
    values: [0.0, 0.05, 0.1]
  reward.reward_production_delta:
    values: [0.0, 0.01, 0.02]
  reward.early_terminal_reward_shaping_enabled:
    values: [true, false]
