program: -m
method: grid
metric:
  name: samples_per_sec
  goal: maximize
command:
  - uv
  - run
  - python
  - ${program}
  - src.train
  - ${args_no_hyphens}
parameters:
  telemetry.wandb.group:
    value: baseline_stage1_comfort
  telemetry.wandb.tags:
    value: [baseline, comfort, throughput, upper_bound, all_models]
  model:
    values: [mlp, attention, entity_transformer_500k, entity_transformer_700k, entity_transformer_1m, gnn_pointer]
  format:
    values: [mix_2p_4p_8env, mix_2p_4p_16env]
  training.total_updates:
    value: 3
  training.rollout_steps:
    values: [64, 128, 250]
  training.minibatch_size:
    values: [256, 512, 1024]
  training.rollout_microbatch_envs:
    values: [4, 8]
  training.update_chunk_rows_min:
    value: 256
  training.update_chunk_rows_max:
    value: 2048
  artifacts.checkpoint_every:
    value: 1000
  artifacts.artifact_pipeline.enabled:
    value: false
  artifacts.replay.enabled:
    value: false
