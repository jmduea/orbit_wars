program: -m
method: random
run_cap: 48
metric:
  name: overall_win_rate
  goal: maximize
command:
  - uv
  - run
  - python
  - ${program}
  - src.train
  - ${args_no_hyphens}
parameters:
  output.campaign:
    value: pgt_topk3_bootstrap_rand2p_u1000
  telemetry.wandb.group:
    value: pgt_topk3_bootstrap_rand2p_u1000
  telemetry.wandb.tags:
    value:
      [
        transformer_factorized,
        pgt_topk3_bootstrap_rand2p_u1000,
        random,
        overall_win_rate,
        soft_start,
        bootstrap_random_2p,
        update1000,
      ]
  curriculum:
    value: self_play_staged
  opponents:
    value: self_play_curriculum
  model:
    value: transformer_factorized
  format:
    value: mix_2p_4p_16env
  training.total_updates:
    value: 1000
  artifacts.checkpoint_every:
    value: 1000
  artifacts.artifact_pipeline.enabled:
    value: true
  artifacts.replay.enabled:
    value: true
  training.gamma:
    value: 0.999
  training.gae_lambda:
    value: 0.99
  training.vf_coef:
    values: [0.5, 1.0]
  training.epochs:
    values: [2, 3]
  training.clip_coef:
    values: [0.1, 0.2]
  training.lr:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.0006
  training.ent_coef:
    distribution: log_uniform_values
    min: 0.001
    max: 0.01
  reward.reward_capture_planet:
    distribution: uniform
    min: 0.0
    max: 0.1
  reward.reward_production_delta:
    distribution: uniform
    min: 0.0
    max: 0.05
  reward.early_terminal_reward_shaping_enabled:
    values: [true, false]
  model.hidden_size:
    values: [140, 224]
  model.attention_heads:
    values: [4, 7]
  model.max_moves_k:
    values: [3, 5, 8]
  model.planet_transformer_layers:
    values: [1, 2, 3]
  task.feature_history_steps:
    values: [2, 5, 10]
  task.trajectory_shield_horizon:
    values: [10, 20, 30]
