program: -m
method: bayes
run_cap: 48
metric:
  name: overall_win_rate
  goal: maximize
command:
  - uv
  - run
  - python
  - ${program}
  - src.train
  - ${args_no_hyphens}
parameters:
  output.campaign:
    value: pgt_topk3_bootstrap_rand2p_u1000
  telemetry.wandb.group:
    value: pgt_topk3_bootstrap_rand2p_u1000
  telemetry.wandb.tags:
    value:
      [
        transformer_factorized,
        pgt_topk3_sp2pstaged_u1000,
        random,
        overall_win_rate,
        soft_start,
        sp_2p_staged,
        2p_32env,
        update1000,
      ]
  curriculum:
    value: sp_2p_staged
  opponents:
    value: self_play_curriculum
  model:
    value: transformer_factorized
  format:
    value: 2p_32env
  training.rollout_microbatch_envs:
    value: 32
  training.total_updates:
    value: 1000
  artifacts.checkpoint_every:
    value: 1000
  artifacts.artifact_pipeline.enabled:
    value: true
  artifacts.replay.enabled:
    value: true
  training.gamma:
    value: 0.995
  training.gae_lambda:
    value: 0.95
  training.vf_coef:
    value: 1.0
  training.epochs:
    values: [1, 2, 3]
  training.clip_coef:
    values: [0.1, 0.2]
  training.lr:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.0006
  training.ent_coef:
    distribution: log_uniform_values
    min: 0.001
    max: 0.005
  model.max_moves_k:
    values: [5, 8, 10]
  task.trajectory_shield_enabled: 
    value: true # TODO: Deprecate, rely on trajectory_shield_mode instead
  task.trajectory_shield_hit_mode: 
    value: selected_target # non_friendly
  task.trajectory_shield_mode:
    value: cheap
  task.trajectory_shield_final_validate_selected:
    value: false
  task.trajectory_shield_horizon: 
    value: 50
  task.trajectory_shield_epsilon: 
    value: 1.0e-06
  task.feature_history_steps:
    values: [5, 10, 15, 20]
