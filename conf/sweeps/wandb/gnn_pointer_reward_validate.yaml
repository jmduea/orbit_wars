program: -m
method: grid
metric:
  name: episode_reward_mean
  goal: maximize
command:
  - uv
  - run
  - python
  - ${program}
  - src.train
  - ${args_no_hyphens}
parameters:
  output.campaign:
    value: gnn_pointer_reward_validate
  telemetry.wandb.group:
    value: gnn_pointer_reward_validate
  telemetry.wandb.tags:
    value: [gnn_pointer, reward, validation, seeds]
  seed:
    values: [101, 202, 303]
  model:
    value: gnn_pointer
  format:
    value: mix_2p_4p_8env
  training.total_updates:
    value: 160
  training.rollout_steps:
    value: 64
  training.minibatch_size:
    value: 256
  training.rollout_microbatch_envs:
    value: 8
  training.update_chunk_rows_min:
    value: 256
  training.update_chunk_rows_max:
    value: 2048
  training.lr:
    value: 0.0003
  training.ent_coef:
    value: 0.005
  training.clip_coef:
    value: 0.2
  model.hidden_size:
    value: 224
  model.max_moves_k:
    value: 3
  model.gnn_k_neighbors:
    value: 5
  model.gnn_message_passing_layers:
    value: 2
  artifacts.checkpoint_every:
    value: 1000
  artifacts.artifact_pipeline.enabled:
    value: false
  artifacts.replay.enabled:
    value: false
