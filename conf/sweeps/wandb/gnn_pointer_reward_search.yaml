program: -m
method: bayes
run_cap: 48
metric:
  name: average_episode_reward
  goal: maximize
command:
  - uv
  - run
  - python
  - ${program}
  - src.train
  - ${args_no_hyphens}
parameters:
  output.campaign:
    value: gnn_pointer_reward_search
  telemetry.wandb.group:
    value: gnn_pointer_reward_search
  telemetry.wandb.tags:
    value: [gnn_pointer, reward, search, bayes]
  model:
    value: gnn_pointer
  format:
    values: [2p_32env, 4p_32env]
  training.total_updates:
    value: 500
  training.rollout_steps:
    value: 500
  training.minibatch_size:
    value: 1024
  training.rollout_microbatch_envs:
    value: 32
  training.update_chunk_rows_min:
    value: 256
  training.update_chunk_rows_max:
    value: 8192
  training.lr:
    values: [0.0001, 0.0003, 0.0006]
  training.ent_coef:
    values: [0.001, 0.005, 0.01]
  training.clip_coef:
    values: [0.1, 0.2]
  model.hidden_size:
    values: [192, 224, 256]
  model.max_moves_k:
    values: [1, 2, 3]
  model.gnn_k_neighbors:
    values: [3, 5, 7]
  model.gnn_message_passing_layers:
    values: [1, 2, 3]
  artifacts.checkpoint_every:
    value: 500
  artifacts.artifact_pipeline.enabled:
    value: true
  artifacts.replay.enabled:
    value: true
