program: -m
method: grid
metric:
  name: samples_per_sec
  goal: maximize
command:
  - uv
  - run
  - python
  - ${program}
  - src.train
  - ${args_no_hyphens}
parameters:
  telemetry.wandb.group:
    value: throughput
  telemetry.wandb.tags:
    value: [throughput, runtime]
  model:
    value: attention
  training.total_updates:
    value: 50
  training.num_envs:
    values: [8, 16, 32]
  training.rollout_steps:
    values: [64, 128, 250]
  training.minibatch_size:
    values: [256, 512, 1024]
