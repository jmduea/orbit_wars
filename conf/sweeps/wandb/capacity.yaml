program: -m
method: bayes
metric:
  name: overall_win_rate
  goal: maximize
command:
  - uv
  - run
  - python
  - ${program}
  - src.train
  - ${args_no_hyphens}
parameters:
  telemetry.wandb.group:
    value: capacity
  telemetry.wandb.tags:
    value: [capacity, model]
  model:
    values: [attention, entity_transformer_500k, entity_transformer_700k]
  training.total_updates:
    value: 250
  task.candidate_count:
    value: 8
  reward:
    value: terminal_only
