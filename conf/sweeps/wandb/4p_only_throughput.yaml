program: -m
method: grid
metric:
  name: samples_per_sec
  goal: maximize
command:
  - uv
  - run
  - python
  - ${program}
  - src.train
  - ${args_no_hyphens}
parameters:
  telemetry:
    value: throughput_only
  output.campaign:
    value: 4p_only_throughput
  model:
    value: mlp
  format:
    values: [4p_16env, 4p_32env]
  training.total_updates:
    value: 30
  training.rollout_steps:
    values: [64, 128, 250, 500]
  training.minibatch_size:
    values: [256, 512, 1024]
  training.rollout_microbatch_envs:
    values: [4, 8, 16]
  training.update_chunk_rows_min:
    values: [2048, 4096, 8192]
