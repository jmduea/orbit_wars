program: -m
method: bayes
metric:
  name: overall_win_rate
  goal: maximize
command:
  - uv
  - run
  - python
  - ${program}
  - src.train
  - ${args_no_hyphens}
parameters:
  opponent_mix:
    value: self_play_curriculum
  env.max_planets:
    values: [48, 56, 64]
  env.candidate_count:
    values: [4, 8, 12, 16]
  env.ship_bucket_count:
    values: [4, 6, 8, 10]
  env.max_fleets:
    values: [256, 512, 1024]
  env.feature_history_steps:
    values: [5, 10, 20]
  ppo.total_updates:
    value: 500
  ppo.rollout_steps:
    values: [32, 64, 128, 256]
  ppo.epochs:
    values: [2, 3, 4, 5]
  ppo.ent_coef:
    values: [0.001, 0.005, 0.01, 0.02]
  ppo.lr:
    values: [0.00003, 0.0003, 0.003]
  ppo.clip_coef:
    values: [0.1, 0.2, 0.3]
  ppo.gamma:
    distribution: uniform
    min: 0.8
    max: 0.9997
  ppo.vf_coef:
    values: [0.5, 1.0]
  model.hidden_size:
    values: [128, 192, 224, 272]
  model.attention_heads:
    values: [4, 6, 7, 8]
