program: -m
method: bayes
metric:
  name: env_steps_per_sec
  goal: maximize
command:
  - uv
  - run
  - python
  - ${program}
  - src.train
  - ${args_no_hyphens}
parameters:
  replay:
    value: disabled
  curriculum:
    value: latest_only
  opponent_mix:
    value: latest_only
  ppo.total_updates:
    value: 120
  ppo.num_envs:
    values: [8, 16, 24, 32, 48, 64]
  ppo.rollout_steps:
    values: [64, 96, 128, 192, 256]
  ppo.minibatch_size:
    values: [256, 512, 1024, 2048]
  ppo.epochs:
    values: [1, 2, 3, 4]
  ppo.update_chunk_rows_min:
    values: [1024, 2048, 4096, 8192]
  ppo.enable_gradient_checkpointing:
    values: [true, false]
  env.player_count:
    values: [2, 4]
  env.max_fleets:
    values: [256, 512, 1024]
  env.candidate_count:
    values: [4, 8, 12]
  env.feature_history_steps:
    values: [10, 25, 50]
