program: -m
method: bayes
metric:
  name: overall_win_rate
  goal: maximize
command:
  - uv
  - run
  - python
  - ${program}
  - src.train
  - ${args_no_hyphens}
parameters:
  model:
    value: gnn_pointer
  replay:
    value: disabled
  curriculum:
    value: self_play_staged
  opponent_mix:
    value: self_play_curriculum
  env.feature_history_steps:
    values: [1, 5, 10]
  env.trajectory_shield_enabled:
    value: false
  ppo.total_updates:
    values: [1000, 5000]
  ppo.rollout_steps:
    values: [32, 64, 128]
  ppo.epochs:
    values: [1, 2, 3]
  ppo.ent_coef:
    values: [0.001, 0.005, 0.01, 0.02]
  ppo.lr:
    values: [0.00003, 0.0001, 0.0003, 0.001]
  ppo.clip_coef:
    values: [0.1, 0.2, 0.3]
  ppo.gamma:
    distribution: uniform
    min: 0.95
    max: 0.9997
  ppo.vf_coef:
    values: [0.7, 1.0]
  model.hidden_size:
    values: [128, 192]
  model.max_moves_k:
    values: [3, 5, 7]
  model.gnn_k_neighbors:
    values: [8, 10, 12]
  model.gnn_message_passing_layers:
    values: [1, 2]
  model.normalize_observations:
    value: true
  model.obs_norm_clip:
    value: 20.0
