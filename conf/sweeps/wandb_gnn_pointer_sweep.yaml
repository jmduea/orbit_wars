program: -m
method: bayes
metric:
  name: overall_win_rate
  goal: maximize
command:
  - uv
  - run
  - python
  - ${program}
  - src.train
  - ${args_no_hyphens}
parameters:
  model:
    value: gnn_pointer
  replay:
    value: enabled
  opponent_mix:
    value: self_play_curriculum
  env.candidate_count:
    values: [4, 8, 12]
  env.ship_bucket_count:
    values: [4, 6, 8, 10]
  env.max_fleets:
    values: [512, 1024]
  env.reward_capture_planet:
    values: [0.0, 0.005, 0.01]
  env.reward_ship_delta:
    values: [0.0, 0.005, 0.01]
  env.reward_production_delta:
    values: [0.0, 0.01, 0.02]
  env.early_terminal_reward_shaping_enabled:
    values: [true, false]
  env.feature_history_steps:
    values: [1, 5, 10, 20]
  ppo.total_updates:
    value: 100
  ppo.rollout_steps:
    values: [32, 64, 128, 256]
  ppo.epochs:
    values: [2, 3, 4]
  ppo.ent_coef:
    values: [0.001, 0.005, 0.01, 0.02]
  ppo.lr:
    values: [0.00003, 0.0001, 0.0003, 0.001]
  ppo.clip_coef:
    values: [0.1, 0.2, 0.3]
  ppo.gamma:
    distribution: uniform
    min: 0.85
    max: 0.9997
  ppo.vf_coef:
    values: [0.5, 1.0]
  model.hidden_size:
    values: [128, 192, 224, 256]
  model.max_moves_k:
    values: [2, 3, 4, 5]
  model.gnn_k_neighbors:
    values: [3, 5, 8, 12]
  model.gnn_message_passing_layers:
    values: [1, 2, 3, 4]
  model.normalize_observations:
    value: true
  model.obs_norm_clip:
    values: [5.0, 10.0, 20.0]
