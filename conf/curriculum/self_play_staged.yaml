      turtle: 0.0
      opportunistic: 0.0
    format_weights:
      2: 0.0
      4: 1.0
  - id: turtle_noop_cheese_gate_4p
    # Thought process is that if our agent doesn't learn to effectively take planets they lose, i.e. noop through whole match == tie, launching ships without taking a planet == loss, agent has to increase there prod or eliminate opponent to win
