# @package _global_
# Bayes search over PPO hyperparameters for Planet Flow learning signal.
#
# Generate:  uv run ow make wandb_sweep=planet_flow_ppo_signal
# Register:  uv run wandb sweep outputs/_meta/sweeps/planet_flow_ppo_signal.yaml
# Agent:     uv run wandb agent <entity>/<project>/<sweep_id>
#
# Objective: maximize planet_flow_sweep_score (win_rate_delta_10 with activity floors).
# Ineligible configs score -1.0 so Bayes rejects launch-collapse degeneracy.
#
# Manual guardrails when selecting winners:
#   - planet_flow_sweep_score should stay above -1.0 with non-zero launches
#   - approx_kl should remain in the calibrated stable band for the proof run
#   - planet_flow_*_delta_vs_control metrics should differ from compiler control
#   - selected configs must pass follow-up calibrate + learn-proof before promotion

defaults:
  - base
  - command: ow_train
  - method: bayes
  - metric: planet_flow_sweep_score
  - fixed: planet_flow_ppo_signal
  - space: planet_flow_ppo_signal
  - _self_

name: planet_flow_ppo_signal
description: >
  Bayes PPO hyperparameter sweep for Planet Flow target-heatmap learning signal
  on random_only 2p runs (200 updates). Maximize planet_flow_sweep_score with
  async local HTML replays, then calibrate and learn-proof the shortlist winner.
run_cap: 24
