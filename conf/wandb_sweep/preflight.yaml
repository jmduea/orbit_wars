# @package _global_
# W&B sweep for preflight (Gates 2–3 learning-signal trend).
#
# Generate:  uv run ow make wandb_sweep=preflight
# Register:  uv run wandb sweep outputs/_meta/sweeps/preflight.yaml
# Agent:     uv run wandb agent <entity>/<project>/<sweep_id>
#
# Objective: maximize preflight_sweep_score (win_rate_delta_10 when KL/entropy
# floors from docs/benchmarks/preflight-calibration.json pass). Ineligible runs score -1.
# Winner checkpoint artifact → packaging validation (step 4) before long train.

defaults:
  - base
  - command: ow_train
  - method: bayes
  - metric: preflight_sweep_score
  - fixed: preflight
  - space: preflight
  - _self_

name: preflight
description: >
  Preflight W&B sweep: Gates 2–3 trend metrics, checkpoint artifacts on pass,
  winner handoff to packaging validation.
run_cap: 24
