# @package _global_
# Throughput sweep for mixed 2p/4p formats (original W&B group: sps_experiment).
# Source: W&B sweep fbrzfxcw (bayes, metric=samples_per_sec).

defaults:
  - base
  - command: ow_train
  - method: bayes
  - metric: samples_per_sec
  - fixed: sps_experiment
  - space: sps_experiment
  - _self_

name: sps_experiment
description: >
  Mixed-format throughput search over rollout shape and opponent profile.
  Recovered from W&B sweep fbrzfxcw.
