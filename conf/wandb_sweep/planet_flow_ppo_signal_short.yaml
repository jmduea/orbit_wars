# @package _global_
# Shorter Bayes re-sweep for Planet Flow v3 shortlist (100 updates, run_cap 12).
#
# Generate:  uv run ow make wandb_sweep=planet_flow_ppo_signal_short
# Register:  uv run wandb sweep outputs/_meta/sweeps/planet_flow_ppo_signal_short.yaml
# Agent:     uv run wandb agent <entity>/<project>/<sweep_id>
#
# Requires sweep_score v3 logging (approx_kl_window_mean, entropy_window_mean).
# Shortlist: uv run ow benchmark shortlist-planet-flow-sweep --sweep-id <id> ...

defaults:
  - base
  - command: ow_train
  - method: bayes
  - metric: preflight_sweep_score
  - fixed: planet_flow_ppo_signal_short
  - space: planet_flow_ppo_signal
  - _self_

name: planet_flow_ppo_signal_short
description: >
  Bayes PPO sweep for Planet Flow on random_only (100 updates, planet_flow profile).
  Optimizes preflight_sweep_score with window-mean KL/entropy guardrails for shortlist.
run_cap: 12
