# @package _global_
# W&B sweep for SSOT short preflight (Gates 2–3 learning-signal trend).
#
# Generate:  uv run ow make wandb_sweep=ssot_preflight
# Register:  uv run wandb sweep outputs/_meta/sweeps/ssot_preflight.yaml
# Agent:     uv run wandb agent <entity>/<project>/<sweep_id>
#
# Objective: maximize preflight_sweep_score (win_rate_delta_10 when KL/entropy
# floors from docs/benchmarks/preflight-calibration.json pass). Ineligible runs score -1.
# Winner checkpoint artifact → packaging validation (step 4) before long train.

defaults:
  - base
  - command: ow_train
  - method: bayes
  - metric: preflight_sweep_score
  - fixed: ssot_preflight
  - space: ssot_preflight
  - _self_

name: ssot_preflight
description: >
  SSOT short preflight W&B sweep: Gates 2–3 trend metrics, checkpoint artifacts on pass,
  winner handoff to packaging validation. No local config registry or bad-config cache.
run_cap: 24
