# @package _global_
# PPO hyperparameter search space for Planet Flow learning signal.

parameters:
  training.lr:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.0003
  training.clip_coef:
    values: [0.1, 0.15, 0.2, 0.25]
  training.ent_coef:
    distribution: log_uniform_values
    min: 0.00005
    max: 0.003
  training.epochs:
    values: [1, 2, 3]
  training.vf_coef:
    values: [0.25, 0.5, 1.0]
  training.max_grad_norm:
    values: [0.3, 0.5, 1.0]
  training.update_chunk_rows:
    values: [512, 1024, 2048]
