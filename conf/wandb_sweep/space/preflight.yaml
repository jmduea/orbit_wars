# @package _global_
# PPO hyperparameter search space for SSOT short preflight (no tag override).

parameters:
  training.lr:
    distribution: log_uniform_values
    min: 0.00005
    max: 0.0003
  training.clip_coef:
    values: [0.1, 0.15, 0.2, 0.25]
  training.ent_coef:
    distribution: log_uniform_values
    min: 0.001
    max: 0.01
  training.epochs:
    value: 1
  training.vf_coef:
    values: [0.25, 0.5, 1.0]
  training.max_grad_norm:
    values: [0.3, 0.5, 1.0]
  reward.reward_capture_planet:
    values: [0.0, 0.05, 0.1]
  reward.reward_ship_delta:
    values: [0.0, 0.01, 0.02]