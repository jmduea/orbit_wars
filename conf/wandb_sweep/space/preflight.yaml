# @package _global_
# PPO hyperparameter search space for SSOT short preflight (no tag override).

parameters:
  model:
    values: [transformer_factorized_small, transformer_factorized, transformer_factorized_large]
  training.rollout_steps:
    values: [256, 384, 512]
  task.trajectory_shield_mode:
    values: ["off", cheap]
  task.trajectory_shield_horizon:
    values: [10, 30, 50, 100]
  task.edge_rank_mode: 
    values: [snapshot, intercept_min]
  training.lr:
    distribution: log_uniform_values
    min: 0.00005
    max: 0.0003
  training.clip_coef:
    values: [0.1, 0.15, 0.2, 0.25]
  training.ent_coef:
    distribution: log_uniform_values
    min: 0.001
    max: 0.01
  training.vf_coef:
    values: [0.25, 0.5, 1.0]
  training.max_grad_norm:
    values: [0.3, 0.5, 1.0]