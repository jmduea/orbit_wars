# @package _global_
# PPO hyperparameter search space for preflight sweep (no tag override).

parameters:
  model:
    values: [transformer_factorized_small, transformer_factorized]
  # task.trajectory_shield_mode:
  #   values: ["off", cheap]
  training.format_weights:
    values: ['{2: 1.0, 4: 0.0}', '{2: 0.0, 4: 1.0}']
  task.feature_history_steps:
    values: [1, 2, 5]
  task.edge_rank_mode: 
    values: [snapshot, intercept_min]
  training.lr:
    distribution: log_uniform_values
    min: 0.00005
    max: 0.0003
  training.clip_coef:
    values: [0.1, 0.15, 0.2, 0.25]
  training.ent_coef:
    distribution: log_uniform_values
    min: 0.001
    max: 0.01
  # training.epochs:
  #   values: [1, 2]
  training.vf_coef:
    values: [0.25, 0.5, 1.0]
  training.max_grad_norm:
    values: [0.3, 0.5, 1.0]
  # seed:
  #   values: [42, 43, 44, 45]