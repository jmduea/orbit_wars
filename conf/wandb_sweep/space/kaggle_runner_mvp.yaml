# @package _global_

parameters:
  training.gamma:
    values: [0.99, 0.999]
  training.gae_lambda:
    values: [0.95, 0.99]
  training.lr:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.0006
  training.ent_coef:
    distribution: log_uniform_values
    min: 0.001
    max: 0.01
  model.hidden_size:
    values: [140, 224]
  model.planet_transformer_layers:
    values: [1, 2]
  task.feature_history_steps:
    values: [2, 5]
  task.trajectory_shield_horizon:
    values: [10, 20]
