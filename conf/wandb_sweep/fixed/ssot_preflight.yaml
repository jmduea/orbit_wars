# @package _global_
# Fixed axes for SSOT preflight sweep (short updates, mix2p4p self-play).

parameters:
  model:
    value: transformer_factorized
  task:
    value: shield_cheap
  training:
    value: smoke
  training.total_updates:
    value: 50
  opponents:
    value: self_play_only
  curriculum:
    value: "off"
  seed:
    value: 42
  output.campaign:
    value: ssot_preflight_sweep
  telemetry:
    value: default
  telemetry.wandb.enabled:
    value: true
  telemetry.wandb.group:
    value: ssot_preflight
  telemetry.wandb.log_artifacts:
    value: true
  telemetry.wandb.tags:
    value:
      - ssot_preflight
      - gates_2_3
      - mix2p4p_selfplay
  telemetry.metric_groups.action_decision:
    value: true
  telemetry.metric_groups.losses:
    value: true
  artifacts:
    value: local_fast
  artifacts.artifact_pipeline.enabled:
    value: false
  artifacts.replay.enabled:
    value: false
  artifacts.checkpoint_every:
    value: 50
