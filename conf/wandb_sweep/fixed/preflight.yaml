# @package _global_
# Fixed axes for preflight sweep (100 updates).

parameters:
  task:
    value: rollout_selected_validate
  training:
    value: 2p_32
  training.rollout_steps:
    value: 512
  training.total_updates:
    value: 100
  training.reseed_every_updates:
    value: 100
  model:
    value: transformer_factorized_small
  curriculum:
    value: noop_only
  output.campaign:
    value: preflight_v2
  telemetry:
    value: default
  telemetry.wandb.enabled:
    value: true
  telemetry.wandb.group:
    value: preflight_v2
  telemetry.wandb.log_artifacts:
    value: true
  telemetry.wandb.tags:
    value:
      - preflight
      - v2
      - 100u
      - 50u_reseed
  artifacts:
    value: default
  artifacts.artifact_pipeline.enabled: 
    value: true
  artifacts.replay.enabled: 
    value: true
  artifacts.replay.every_n_checkpoints: 
    value: 1
  artifacts.artifact_pipeline.replay_async: 
    value: true
  artifacts.artifact_pipeline.checkpoint_eval_async: 
    value: true
  artifacts.artifact_pipeline.docker_validation_async: 
    value: true
  telemetry.metric_groups.action_decision:
    value: true
  telemetry.metric_groups.losses:
    value: true
  artifacts.checkpoint_every:
    value: 100
