# @package _global_
# Fixed axes for SSOT preflight sweep (50 updates, noop_only, rollout_selected_validate).

parameters:
  model:
    value: transformer_factorized_small
  task:
    value: rollout_selected_validate
  training:
    value: 2p_16
  training.total_updates:
    value: 50
  opponents:
    value: noop_only
  curriculum:
    value: "off"
  seed:
    value: 42
  output.campaign:
    value: preflight
  telemetry:
    value: default
  telemetry.wandb.enabled:
    value: true
  telemetry.wandb.group:
    value: preflight
  telemetry.wandb.log_artifacts:
    value: true
  telemetry.wandb.tags:
    value:
      - preflight
  telemetry.metric_groups.action_decision:
    value: false
  telemetry.metric_groups.losses:
    value: true
  artifacts.checkpoint_every:
    value: 50
