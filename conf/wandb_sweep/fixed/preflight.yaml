# @package _global_
# Fixed axes for preflight sweep (200 updates, noop_only, rollout_selected_validate).

parameters:
  task:
    value: rollout_selected_validate
  training:
    value: 2p4p_32_split
  training.total_updates:
    value: 100
  opponents:
    value: throughput_recovery
  curriculum:
    value: "off"
  seed:
    value: 42
  output.campaign:
    value: preflight
  telemetry:
    value: default
  telemetry.wandb.enabled:
    value: true
  telemetry.wandb.group:
    value: preflight
  telemetry.wandb.log_artifacts:
    value: true
  telemetry.wandb.tags:
    value:
      - preflight
      - noop_only
      - 2p4p_16_split
      - 200u
      - rsv
      - REPLAY_ON
  artifacts:
    value: default
  artifacts.artifact_pipeline.enabled: 
    value: true
  artifacts.replay.enabled: 
    value: true
  artifacts.replay.every_n_checkpoints: 
    value: 1
  artifacts.artifact_pipeline.replay_async: 
    value: true
  artifacts.artifact_pipeline.checkpoint_eval_async: 
    value: true
  artifacts.artifact_pipeline.docker_validation_async: 
    value: true
  telemetry.metric_groups.losses:
    value: true
  artifacts.checkpoint_every:
    value: 100
