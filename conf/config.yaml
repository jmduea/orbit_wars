defaults:
  - model: default
  - task: default
  - reward: default
  - training: default
  - curriculum: default
  - telemetry: default
  - artifacts: default
  - _self_
  - sweep_arm: none

seed: 42
run_name: default
heldout_eval_seed_set: []
training_seed_set: []
eval_seed_set: [0, 1, 2, 3, 486, 487, 488, 499]
print_resolved_config: false
resume_checkpoint: null
from_promoted: null

output:
  root: outputs
  campaign: default
  run_id: ${orbit_run_id:${seed}}
  retention_class: compact
  indexes_dir: indexes
  cache_dir: cache
  wandb_dir: cache/wandb
  wandb_artifact_dir: cache/wandb-artifacts
  wandb_data_dir: cache/wandb-data

hydra:
  run:
    dir: ${orbit_safe_rel:${output.root}}/campaigns/${orbit_slug:${output.campaign}}/runs/${orbit_slug:${output.run_id}}
  sweep:
    dir: ${orbit_safe_rel:${output.root}}/campaigns/${orbit_slug:${output.campaign}}
    subdir: ${orbit_sweep_subdir:${hydra.job.num},${hydra.job.override_dirname},${output.run_id}}
