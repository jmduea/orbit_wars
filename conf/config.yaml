defaults:
  - model: default
  - task: default
  - reward: default
  - training: default
  - format: default
  - curriculum: default
  - opponents: default
  - telemetry: default
  - artifacts: default
  - optional sweep_space: none
  - optional preset: null
  - _self_

seed: 42
run_name: default
device: auto
heldout_eval_seed_set: []
print_resolved_config: false
resume_checkpoint: null

output:
  root: outputs
  campaign: default
  run_id: ${orbit_run_id:${seed}}
  retention_class: compact
  indexes_dir: indexes
  cache_dir: cache
  wandb_dir: cache/wandb
  wandb_artifact_dir: cache/wandb-artifacts
  wandb_data_dir: cache/wandb-data

hydra:
  run:
    dir: ${orbit_safe_rel:${output.root}}/campaigns/${orbit_slug:${output.campaign}}/runs/${orbit_slug:${output.run_id}}
  sweep:
    dir: ${orbit_safe_rel:${output.root}}/campaigns/${orbit_slug:${output.campaign}}
    subdir: runs/${hydra.job.num}_${orbit_slug:${output.run_id}}
