defaults:
  - model: gnn_pointer
  - training_format: mix_2p_4p_8env
  - opponent_mix: self_play_curriculum
  - replay: enabled
  - checkpoint_retention: default
  - telemetry: default
  - experiment: null
  - _self_

seed: 42
run_name: orbit_wars_template_ppo
device: auto
save_dir: artifacts/rl_template
checkpoint_every: 50
log_every: 5
opponent: self
self_play_update_interval: 10
self_play_deterministic: false
multi_opponent_mode: mixed
alternate_player_sides: true
env:
  candidate_count: 8
  ship_bucket_count: 8
  max_fleets: 256
  player_count: 2
  max_ships: 400.0
  reward_capture_planet: 0.1
  reward_ship_delta: 0.0
  reward_production_delta: 0.01
  reward_terminal_scale: 1.0
  early_terminal_reward_shaping_enabled: true
  early_terminal_reward_shaping_horizon: 500
  terminal_reward_mode: binary_win
  feature_history_steps: 50
ppo:
  rollout_steps: 250
  num_envs: 16
  total_updates: 500
  epochs: 4
  minibatch_size: 512
  gamma: 0.99
  clip_coef: 0.2
  ent_coef: 0.005
  vf_coef: 0.5
  lr: 0.0003
  max_grad_norm: 0.5
  update_chunk_rows_min: 2048
  update_chunk_rows_max: null
  rollout_microbatch_envs: null
  enable_gradient_checkpointing: true
reseed_every_updates: 0
reseed_on_plateau: false
plateau_metric: episode_reward_mean
plateau_window: 10
plateau_delta: 0.0
heldout_eval_seed_set: []
print_resolved_config: false
resume_checkpoint: null
