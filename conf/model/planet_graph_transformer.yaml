# Planet-edge masked self-attention encoder (M2).
# GNN-only knobs (gnn_k_neighbors, gnn_message_passing_layers) are ignored on this preset.
architecture: planet_graph_transformer
hidden_size: 224
attention_heads: 7
max_moves_k: 3
planet_transformer_layers: 2
spatial_attention_bias: true
normalize_observations: true
obs_norm_clip: 10.0
