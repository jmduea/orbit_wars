seed: 42
run_name: orbit_wars_ppo_jax_self_play_shaped_reward
# JAX selects its accelerator internally; keep this for schema parity with Torch configs.
device: auto
save_dir: artifacts/jax_self_play_shaped_reward_training
checkpoint_every: 50
log_every: 1
# End-to-end JAX self-play currently trains against the learner's current policy.
opponent: self
self_play_update_interval: 50
self_play_deterministic: false
self_play_enabled: true
self_play_pool_size: 5
self_play_snapshot_interval: 50
self_play_latest_probability: 0.5
multi_opponent_mode: mixed
alternate_player_sides: true

# End-to-end JAX path: fixed-shape JAX environment plus JAX PPO updates.
env_backend: jax
rl_backend: jax

env:
  # Includes reserved no-op index 0; real target slots are candidate_count - 1.
  candidate_count: 8
  ship_bucket_count: 8
  player_count: 2
  max_planets: 48
  max_fleets: 256
  # Conservative shaping: keep terminal win/loss as the dominant signal.
  reward_capture_planet: 0.1
  reward_ship_delta: 0.001
  reward_production_delta: 0.02
  reward_terminal_scale: 1.0

training_format:
  # env.player_count is the default; this schedule introduces 4-player episodes later.
  format_schedule:
    - player_count: 2
      start_update: 0
      weight: 1.0
    - player_count: 4
      start_update: 1000
      weight: 1.0
  format_mix: []
  rollout_groups:
    - name: two_player
      player_count: 2
      num_envs: 16
    - name: four_player
      player_count: 4
      num_envs: 16

model:
  architecture: attention  # mlp | attention | transformer
  hidden_size: 128
  attention_heads: 4
  normalize_observations: true
  obs_norm_clip: 10.0

ppo:
  rollout_steps: 500
  num_envs: 32
  num_envs_2p: 16
  num_envs_4p: 16
  total_updates: 2000
  epochs: 4
  minibatch_size: 500
  gamma: 0.99
  clip_coef: 0.2
  ent_coef: 0.02
  vf_coef: 0.5
  lr: 0.0001
  max_grad_norm: 0.5
