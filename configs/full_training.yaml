seed: 42
run_name: orbit_wars_ppo_full_training
device: auto
save_dir: /kaggle/working/artifacts/full_training
checkpoint_every: 50
log_every: 1
opponent: self
self_play_update_interval: 50
self_play_deterministic: false
alternate_player_sides: true

env:
  candidate_count: 8
  ship_bucket_count: 8
  reward_capture_planet: 0.0
  reward_ship_delta: 0.0
  reward_production_delta: 0.0
  reward_terminal_scale: 1.0

model:
  hidden_size: 128
  normalize_observations: true
  obs_norm_clip: 10.0

ppo:
  rollout_steps: 512
  num_envs: 8
  total_updates: 2000
  epochs: 4
  minibatch_size: 512
  gamma: 0.99
  clip_coef: 0.2
  ent_coef: 0.02
  vf_coef: 0.5
  lr: 0.0001
  max_grad_norm: 0.5
