
seed: 42
run_name: orbit_wars_ppo
device: auto
save_dir: /artifacts
checkpoint_every: 50
log_every: 1
opponent: self
env_backend: kaggle  # kaggle | jax
rl_backend: torch  # torch | jax
self_play_update_interval: 50
self_play_deterministic: false
self_play_enabled: false
self_play_pool_size: 5
self_play_snapshot_interval: 50
self_play_latest_probability: 0.5
multi_opponent_mode: mixed
alternate_player_sides: true

env:
  # Includes reserved no-op index 0; real target slots are candidate_count - 1.
  candidate_count: 8
  ship_bucket_count: 8
  player_count: 2
  reward_capture_planet: 0.0
  reward_ship_delta: 0.0
  reward_production_delta: 0.0
  reward_terminal_scale: 1.0
  terminal_reward_mode: binary_win  # binary_win | ranked | score_share | survival_plus_rank

model:
  architecture: mlp  # mlp | attention | transformer
  hidden_size: 128
  attention_heads: 4
  normalize_observations: true
  obs_norm_clip: 10.0

ppo:
  rollout_steps: 64
  num_envs: 2
  total_updates: 100 # Fast notebook/demo setting. Use configs/full_training.yaml for reproducible 2000-update training.
  epochs: 4
  minibatch_size: 256
  gamma: 0.99
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  lr: 0.0003
  max_grad_norm: 0.5
